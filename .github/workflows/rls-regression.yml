name: RLS Regression Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  subscriptions-rls:
    name: Subscriptions billing immutability
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase auth + storage surface
        run: |
          psql <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$
              SELECT NULLIF(current_setting('request.jwt.claims', true)::jsonb ->> 'sub','')::uuid
            $$;
          CREATE ROLE anon NOLOGIN;
          CREATE ROLE authenticated NOLOGIN;
          CREATE ROLE service_role NOLOGIN BYPASSRLS;
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;

          -- Minimal storage schema so migrations that touch storage.buckets /
          -- storage.objects (bucket creation, RLS policies) can run against
          -- plain Postgres in CI.
          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text NOT NULL,
            public boolean NOT NULL DEFAULT false,
            created_at timestamptz NOT NULL DEFAULT now(),
            updated_at timestamptz NOT NULL DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS storage.objects (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id text REFERENCES storage.buckets(id),
            name text,
            owner uuid,
            created_at timestamptz NOT NULL DEFAULT now(),
            updated_at timestamptz NOT NULL DEFAULT now()
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
          CREATE OR REPLACE FUNCTION storage.foldername(name text)
            RETURNS text[] LANGUAGE sql IMMUTABLE AS $$
              SELECT string_to_array(name, '/')
            $$;
          GRANT USAGE ON SCHEMA storage TO anon, authenticated, service_role;
          GRANT SELECT, INSERT, UPDATE, DELETE ON storage.buckets, storage.objects
            TO anon, authenticated, service_role;
          SQL

      - name: Apply migrations in order
        run: |
          set -e
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "-> $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run subscriptions RLS regression tests
        run: bash tests/subscriptions_rls_regression.sh | tee /tmp/rls.log

      - name: Fail if any regression failed
        run: |
          if grep -q '^FAIL:' /tmp/rls.log; then
            echo "::error::One or more RLS regression tests failed"
            exit 1
          fi