name: Migration Smoke Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  fresh-db-migrations:
    name: Apply migrations on fresh Postgres + verify storage steps
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Bootstrap Supabase auth + storage surface
        run: |
          psql -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid
            LANGUAGE sql STABLE AS $$
              SELECT NULLIF(current_setting('request.jwt.claims', true)::jsonb ->> 'sub','')::uuid
            $$;
          CREATE ROLE anon NOLOGIN;
          CREATE ROLE authenticated NOLOGIN;
          CREATE ROLE service_role NOLOGIN BYPASSRLS;
          GRANT USAGE ON SCHEMA public TO anon, authenticated, service_role;

          CREATE SCHEMA IF NOT EXISTS storage;
          CREATE TABLE IF NOT EXISTS storage.buckets (
            id text PRIMARY KEY,
            name text NOT NULL,
            public boolean NOT NULL DEFAULT false,
            created_at timestamptz NOT NULL DEFAULT now(),
            updated_at timestamptz NOT NULL DEFAULT now()
          );
          CREATE TABLE IF NOT EXISTS storage.objects (
            id uuid PRIMARY KEY DEFAULT gen_random_uuid(),
            bucket_id text REFERENCES storage.buckets(id),
            name text,
            owner uuid,
            created_at timestamptz NOT NULL DEFAULT now(),
            updated_at timestamptz NOT NULL DEFAULT now()
          );
          ALTER TABLE storage.objects ENABLE ROW LEVEL SECURITY;
          CREATE OR REPLACE FUNCTION storage.foldername(name text)
            RETURNS text[] LANGUAGE sql IMMUTABLE AS $$
              SELECT string_to_array(name, '/')
            $$;
          GRANT USAGE ON SCHEMA storage TO anon, authenticated, service_role;
          GRANT SELECT, INSERT, UPDATE, DELETE ON storage.buckets, storage.objects
            TO anon, authenticated, service_role;
          SQL

      - name: Discover storage-touching migrations
        id: storage_migs
        run: |
          set -e
          mapfile -t files < <(grep -lE '(\bstorage\.(buckets|objects|foldername)\b)' supabase/migrations/*.sql | sort)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No storage-touching migrations found — smoke test cannot verify anything"
            exit 1
          fi
          echo "Storage-touching migrations:"
          printf '  %s\n' "${files[@]}"
          printf '%s\n' "${files[@]}" > /tmp/storage_migs.txt

      - name: Apply migrations in order (log each storage step)
        run: |
          set -e
          : > /tmp/applied_storage.txt
          for f in $(ls supabase/migrations/*.sql | sort); do
            echo "==> applying $f"
            psql -v ON_ERROR_STOP=1 -f "$f"
            if grep -qxF "$f" /tmp/storage_migs.txt; then
              echo "    (storage-touching migration OK)"
              echo "$f" >> /tmp/applied_storage.txt
            fi
          done

      - name: Verify every storage-touching migration ran
        run: |
          set -e
          diff <(sort /tmp/storage_migs.txt) <(sort /tmp/applied_storage.txt) \
            || { echo "::error::Not every storage-touching migration completed"; exit 1; }
          echo "All storage-touching migrations applied cleanly."

      - name: Verify post-migration storage state
        run: |
          set -e
          echo "-- storage.buckets --"
          psql -v ON_ERROR_STOP=1 -c "SELECT id, name, public FROM storage.buckets ORDER BY id;"

          echo "-- audio-files bucket exists --"
          COUNT=$(psql -tAc "SELECT count(*) FROM storage.buckets WHERE id = 'audio-files';")
          if [ "$COUNT" != "1" ]; then
            echo "::error::Expected exactly one 'audio-files' bucket row, got $COUNT"
            exit 1
          fi

          echo "-- audio-files must be private after lock-down migration --"
          PUBLIC=$(psql -tAc "SELECT public FROM storage.buckets WHERE id = 'audio-files';")
          if [ "$PUBLIC" != "f" ]; then
            echo "::error::audio-files bucket should be private (public=false), got public=$PUBLIC"
            exit 1
          fi

          echo "-- policies on storage.objects for audio-files --"
          psql -v ON_ERROR_STOP=1 -c "SELECT policyname, cmd FROM pg_policies WHERE schemaname='storage' AND tablename='objects' ORDER BY policyname;"

          POLICY_COUNT=$(psql -tAc "SELECT count(*) FROM pg_policies WHERE schemaname='storage' AND tablename='objects';")
          if [ "$POLICY_COUNT" -lt 4 ]; then
            echo "::error::Expected at least 4 storage.objects policies (select/insert/update/delete), got $POLICY_COUNT"
            exit 1
          fi

          echo "Storage smoke test passed."